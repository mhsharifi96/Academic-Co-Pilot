server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend service on the compose network.
    # Same-origin from the browser's perspective, so no CORS is needed.
    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File uploads can be large; don't cap the body size.
        client_max_body_size 100M;
        # Agent + LLM calls can take a while; be patient before timing out.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
