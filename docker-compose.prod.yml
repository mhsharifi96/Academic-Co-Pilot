# Production stack. Run with:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# This server already runs a host-level nginx that owns ports 80/443 and serves
# multiple sites, so this stack does NOT run its own Caddy/TLS. Instead the
# frontend is published on 127.0.0.1:5176 (localhost only) and the host nginx
# reverse-proxies academic.hiagent.me -> 127.0.0.1:5176 (see deploy/nginx-academic.conf).
#
# Differences vs. the dev docker-compose.yml:
#   - db and app ports are NOT published to the host; they're only reachable on
#     the internal compose network.
#   - frontend is published on 127.0.0.1:5176 (not 0.0.0.0) so only the host
#     nginx can reach it, never the public internet directly.
#   - app runs the image's production CMD (uvicorn, no --reload) and does NOT
#     bind-mount the source tree. Only ./data and ./output_figures are mounted
#     so generated artifacts (the downloadable .docx/.xlsx/figures) survive
#     container restarts.
#   - restart: unless-stopped on every long-lived service.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: paper_agent_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-paper_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-paper_agent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: paper_agent_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-paper_agent}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - LANGCHAIN_API_KEY=${LANGSMITH_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGSMITH_TRACING:-true}
      - LANGCHAIN_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGCHAIN_PROJECT=${LANGSMITH_PROJECT:-paper-agent}
    volumes:
      - ./data:/app/data
      - ./output_figures:/app/output_figures
    depends_on:
      db:
        condition: service_healthy
    # No command override -> uses the Dockerfile CMD (uvicorn, no --reload).

  frontend:
    build: ./frontend
    container_name: paper_agent_ui
    restart: unless-stopped
    ports:
      # Bind to localhost only — the host nginx proxies to this; the public
      # never reaches it directly.
      - "127.0.0.1:5176:80"
    depends_on:
      - app

volumes:
  postgres_data:
