services:
  db:
    image: pgvector/pgvector:pg16
    container_name: paper_agent_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-paper_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-paper_agent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: paper_agent_app
    ports:
      - "8000:8005"
    # Load everything from .env (OPENAI_MODEL, POWERFUL_MODEL, IMAGE_MODEL,
    # CROSSREF_MAILTO, ELSEVIER_API_KEY, OPENALEX_API_KEY, REQUIRE_TOOL_APPROVAL,
    # ENVIRONMENT, ...). The explicit `environment:` keys below override these
    # (e.g. DATABASE_URL points at the `db` service host, not localhost).
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-paper_agent}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - LANGCHAIN_API_KEY=${LANGSMITH_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGSMITH_TRACING:-true}
      - LANGCHAIN_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGCHAIN_PROJECT=${LANGSMITH_PROJECT:-paper-agent}
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8005 --reload

  frontend:
    build: ./frontend
    container_name: paper_agent_ui
    ports:
      - "5173:80"
    depends_on:
      - app

volumes:
  postgres_data:
