# Host nginx vhost for academic.hiagent.me
#
# This runs on the SERVER's nginx (the one already serving your other sites),
# NOT inside Docker. It reverse-proxies the domain to the PaperAgent frontend
# container, which is published on 127.0.0.1:5176 by docker-compose.prod.yml.
#
# Install:
#   sudo cp deploy/nginx-academic.conf /etc/nginx/sites-available/academic.hiagent.me
#   sudo ln -s /etc/nginx/sites-available/academic.hiagent.me /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then get a TLS cert (Let's Encrypt). With the certbot nginx plugin:
#   sudo certbot --nginx -d academic.hiagent.me
# certbot will edit this file to add the listen 443 / ssl_certificate lines and
# an HTTP->HTTPS redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name academic.hiagent.me;

    # Uploads can be large (PDFs, CSVs); don't cap the body size.
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:5176;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Agent + LLM calls can take a while; be patient before timing out.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # WebSocket / streaming support, in case it's used.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
